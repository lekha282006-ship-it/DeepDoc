version: '3.8'

services:
  # Vector Database for semantic search
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage

  # Regression tracking and model evaluation
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./artifacts

  # Metadata storage
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: deepdoc_user
      POSTGRES_PASSWORD: deepdoc_password
      POSTGRES_DB: deepdoc_metadata
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data

  # Caching for tool calls and embeddings
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  qdrant_storage:
  postgres_data:
